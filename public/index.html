<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公號數字學 — 手機號碼五格分析</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>公號數字學 — 手機號碼五格分析</h1>

  <nav class="topnav">
    <a href="index.html" class="active">單號分析</a>
    <a href="rank.html">批次選號・好號碼篩選</a>
  </nav>

  <form id="analyzeForm">
    <label>
      手機號碼
      <input id="phone" type="text" inputmode="numeric" maxlength="15" placeholder="例如 0936102682" required>
    </label>
    <p class="hint">輸入台灣手機 10 碼即可,系統會自動去掉開頭的 0,依老師的算法切成 3-3-3。</p>
    <details class="advanced">
      <summary>進階:自訂分組規則</summary>
      <label>
        分組規則(留空＝自動)
        <input id="groups" type="text" placeholder="自動" pattern="^(\d+(-\d+)+)?$">
      </label>
      <p class="hint">例如填 <code>3-3-4</code> 則用 10 碼不去 0 的切法。一般不需要動。</p>
    </details>
    <button type="submit" id="submitBtn">分析</button>
  </form>

  <div id="error" hidden></div>

  <div id="result" hidden>
    <div id="appliedInfo" class="applied"></div>
    <div id="verdict"></div>

    <table id="fiveGridTable">
      <thead>
        <tr>
          <th>格名</th><th>數值</th><th>個位</th><th>五行</th><th>吉凶</th><th>權重</th><th>與總格關係</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <section id="detailSection">
      <h3>各格詳解（81 數理斷語）</h3>
      <div id="detailList"></div>
    </section>

    <details id="extendedWrap" class="advanced">
      <summary>延伸關係格（子息・健康・配偶・朋友）</summary>
      <table id="extendedTable">
        <thead>
          <tr><th>格名</th><th>數值</th><th>個位</th><th>五行</th><th>與總格關係</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </details>

    <!-- AI 進階個人化 -->
    <section id="aiSection" class="ai-card">
      <h3>🔮 AI 進階個人化解析</h3>
      <p class="hint">填入你的生辰資料,讓命理師結合「你這個人」與「這支號碼」給專屬解讀（免費版只看號碼,進階版更貼近你）。</p>
      <div class="profile-grid">
        <label>姓名<input id="pf-name" type="text" placeholder="（選填）"></label>
        <label>性別
          <select id="pf-gender">
            <option value="">（選填）</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </label>
        <label>國曆出生年月日<input id="pf-date" type="date"></label>
        <label>出生時辰<input id="pf-time" type="time"></label>
      </div>
      <button type="button" id="aiBtn" class="btn">生成個人化命理解析</button>
      <div id="aiError" class="ai-error" hidden></div>
      <div id="aiOutput" class="ai-output" hidden></div>
    </section>
  </div>

  <script>
    const FIVE_GRID_KEYS = ['總格', '天格', '人格', '地格', '外格']
    const EXTENDED_KEYS = ['子息', '健康', '配偶', '朋友']
    const SYMBOL_CLASS = { '○': 'symbol-good', '▲': 'symbol-mid', 'X': 'symbol-bad' }

    const $ = (id) => document.getElementById(id)
    const form = $('analyzeForm')
    const phoneInput = $('phone')
    const groupsInput = $('groups')
    const submitBtn = $('submitBtn')
    const errorEl = $('error')
    const resultEl = $('result')
    const appliedInfo = $('appliedInfo')
    const verdictEl = $('verdict')
    const fiveGridBody = document.querySelector('#fiveGridTable tbody')
    const detailList = $('detailList')
    const extendedBody = document.querySelector('#extendedTable tbody')
    const aiBtn = $('aiBtn')
    const aiOutput = $('aiOutput')
    const aiError = $('aiError')

    let lastPhone = ''
    let lastGroups = []

    const symbolClass = (s) => SYMBOL_CLASS[s] || ''

    // ── 自動分組:10 碼去 0 → 3-3-3 ──
    function normalize(rawPhone, rawGroups) {
      let phone = rawPhone.replace(/[\s-]/g, '')
      let groups
      const manual = rawGroups && rawGroups.trim() && rawGroups.trim() !== '自動'
      if (manual) {
        groups = rawGroups.split('-').map((p) => Number(p.trim()))
      } else if (phone.length === 10 && phone.startsWith('0')) {
        phone = phone.slice(1)
        groups = [3, 3, 3]
      } else if (phone.length === 9) {
        groups = [3, 3, 3]
      } else {
        const rest = phone.length - 6
        groups = rest > 0 ? [3, 3, rest] : [phone.length]
      }
      return { phone, groups }
    }

    function showError(msg) { resultEl.hidden = true; errorEl.hidden = false; errorEl.textContent = msg }
    function hideError() { errorEl.hidden = true; errorEl.textContent = '' }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))
    }

    // 輕量 markdown(AI 解析用)
    function renderMarkdown(src) {
      const lines = src.split('\n'); const out = []
      const inline = (t) => escapeHtml(t).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      for (const line of lines) {
        let m
        if ((m = line.match(/^(#{1,4})\s+(.*)$/))) { const lv = Math.min(m[1].length + 1, 5); out.push(`<h${lv}>${inline(m[2])}</h${lv}>`); continue }
        if ((m = line.match(/^\s*\d+\.\s+(.*)$/))) { out.push(`<p class="li">• ${inline(m[1])}</p>`); continue }
        if ((m = line.match(/^\s*[-*]\s+(.*)$/))) { out.push(`<p class="li">• ${inline(m[1])}</p>`); continue }
        out.push(line.trim() === '' ? '' : `<p>${inline(line)}</p>`)
      }
      return out.join('\n')
    }

    function renderVerdict(data) {
      const totalSymbol = data.fiveGrid.總格.symbol
      verdictEl.className = symbolClass(totalSymbol)
      verdictEl.innerHTML = [
        `<div class="level">${data.score.level}</div>`,
        `<div>加權分：${data.score.weighted} / 100</div>`,
        data.isPremium ? '<div class="premium">★ 雙吉格</div>' : '',
      ].join('')
    }

    function renderFiveGrid(fiveGrid) {
      fiveGridBody.replaceChildren()
      detailList.replaceChildren()
      for (const key of FIVE_GRID_KEYS) {
        const g = fiveGrid[key]
        const relation = key === '總格' ? '—（本體）' : (g.relation ?? '—')
        const tr = document.createElement('tr')
        tr.className = symbolClass(g.symbol)
        tr.innerHTML = `<td>${key}</td><td>${g.value}</td><td>${g.digit}</td><td>${g.wuxing}</td><td>${g.symbol} ${g.luck}</td><td>${g.weight}</td><td>${relation}</td>`
        fiveGridBody.appendChild(tr)

        const card = document.createElement('div')
        card.className = 'detail-item ' + symbolClass(g.symbol)
        card.innerHTML = `<div class="detail-head">${key}　<b>${g.value}</b>　${g.wuxing}　${g.symbol} ${g.luck}</div><div class="detail-text">${escapeHtml(g.text || '（無斷語）')}</div>`
        detailList.appendChild(card)
      }
    }

    function renderExtended(extended) {
      extendedBody.replaceChildren()
      for (const key of EXTENDED_KEYS) {
        const g = extended[key]
        const tr = document.createElement('tr')
        tr.innerHTML = `<td>${key}</td><td>${g.value}</td><td>${g.digit}</td><td>${g.wuxing}</td><td>${g.relation ?? '—'}</td>`
        extendedBody.appendChild(tr)
      }
    }

    function renderResult(data) {
      hideError()
      resultEl.hidden = false
      resultEl.classList.remove('fade-in'); void resultEl.offsetWidth; resultEl.classList.add('fade-in')
      appliedInfo.textContent = `已套用：${data.groups.join('-')}　切法 ${data.input.match(/.{1,3}/g)?.slice(0, data.groups.length).join(' / ') ?? data.input}`
      renderVerdict(data)
      renderFiveGrid(data.fiveGrid)
      renderExtended(data.extended)
      // 重置 AI 區
      aiOutput.hidden = true; aiOutput.innerHTML = ''; aiError.hidden = true
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault()
      const { phone, groups } = normalize(phoneInput.value, groupsInput.value)
      lastPhone = phone; lastGroups = groups

      submitBtn.disabled = true
      const orig = submitBtn.textContent
      submitBtn.textContent = '掐指一算中…'
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, groups }),
        })
        const data = await res.json()
        if (!res.ok) { showError(data.error || '分析失敗，請稍後再試'); return }
        renderResult(data)
      } catch {
        showError('無法連線至伺服器，請確認服務是否已啟動')
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = orig
      }
    })

    // ── AI 進階個人化解析 ──
    aiBtn.addEventListener('click', async () => {
      if (!lastPhone) return
      const profile = {
        name: $('pf-name').value.trim(),
        gender: $('pf-gender').value,
        birthDate: $('pf-date').value,
        birthTime: $('pf-time').value,
      }
      aiError.hidden = true
      aiOutput.hidden = false
      aiOutput.innerHTML = '<p class="loading">命理師正在為你細看…（約 20-40 秒）</p>'
      aiBtn.disabled = true
      const orig = aiBtn.textContent
      aiBtn.textContent = '解析中…'
      try {
        const res = await fetch('/api/analyze?aiComment=true', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: lastPhone, groups: lastGroups, profile }),
        })
        const data = await res.json()
        if (!res.ok) { aiOutput.hidden = true; aiError.hidden = false; aiError.textContent = data.error || '解析失敗'; return }
        if (!data.aiComment) {
          aiOutput.hidden = true; aiError.hidden = false
          aiError.textContent = 'AI 解析未產生內容。請確認伺服器啟動時 claude CLI 已登入（或改用 OpenAI）。'
          return
        }
        aiOutput.innerHTML = renderMarkdown(data.aiComment)
      } catch {
        aiOutput.hidden = true; aiError.hidden = false; aiError.textContent = '無法連線至伺服器'
      } finally {
        aiBtn.disabled = false; aiBtn.textContent = orig
      }
    })

    // AI 關閉時(部署/送人版)移除 AI 進階區
    fetch('/api/config').then((r) => r.json()).then((c) => {
      if (!c.ai) { const a = document.getElementById('aiSection'); if (a) a.remove() }
    }).catch(() => {})

    // 從 rank.html 帶號碼進來自動分析
    const _pre = new URLSearchParams(window.location.search).get('phone')
    if (_pre) { phoneInput.value = _pre; form.requestSubmit() }
  </script>
</body>
</html>
