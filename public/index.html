<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公號數字學 — 手機號碼五格分析</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>公號數字學 — 手機號碼五格分析</h1>

  <nav class="topnav">
    <a href="index.html" class="active">單號分析</a>
    <a href="rank.html">批次選號・好號碼篩選</a>
  </nav>

  <form id="analyzeForm">
    <label>
      手機號碼
      <input id="phone" type="text" maxlength="15" placeholder="0936102682" required>
    </label>
    <label>
      分組規則
      <input id="groups" type="text" value="3-3-4" pattern="^\d+(-\d+)+$" required>
    </label>
    <p class="hint">台灣手機 10 碼，預設切法：09xx-xxx-xxxx（即 3-3-4）</p>
    <label>
      <input type="checkbox" id="aiCommentToggle"> AI 口語解讀（需設定 LLM）
    </label>
    <button type="submit">分析</button>
  </form>

  <div id="error" hidden></div>

  <div id="result" hidden>
    <div id="verdict"></div>
    <table id="fiveGridTable">
      <thead>
        <tr>
          <th>格名</th>
          <th>數值</th>
          <th>個位</th>
          <th>五行</th>
          <th>吉凶</th>
          <th>權重</th>
          <th>與總格關係</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <table id="extendedTable">
      <thead>
        <tr>
          <th>格名</th>
          <th>數值</th>
          <th>個位</th>
          <th>五行</th>
          <th>與總格關係</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <section id="aiCommentSection" style="display:none">
      <h3>AI 口語解讀</h3>
      <p id="aiCommentText"></p>
    </section>
  </div>

  <script>
    const FIVE_GRID_KEYS = ['總格', '天格', '人格', '地格', '外格']
    const EXTENDED_KEYS = ['子息', '健康', '配偶', '朋友']

    const SYMBOL_CLASS = {
      '○': 'symbol-good',
      '▲': 'symbol-mid',
      'X': 'symbol-bad',
    }

    const form = document.getElementById('analyzeForm')
    const phoneInput = document.getElementById('phone')
    const groupsInput = document.getElementById('groups')
    const errorEl = document.getElementById('error')
    const resultEl = document.getElementById('result')
    const verdictEl = document.getElementById('verdict')
    const fiveGridBody = document.querySelector('#fiveGridTable tbody')
    const extendedBody = document.querySelector('#extendedTable tbody')
    const aiCommentToggle = document.getElementById('aiCommentToggle')
    const aiCommentSection = document.getElementById('aiCommentSection')
    const aiCommentText = document.getElementById('aiCommentText')

    function symbolClass(symbol) {
      return SYMBOL_CLASS[symbol] || ''
    }

    function showError(message) {
      resultEl.hidden = true
      errorEl.hidden = false
      errorEl.textContent = message
    }

    function hideError() {
      errorEl.hidden = true
      errorEl.textContent = ''
    }

    function renderVerdict(data) {
      const { score, isPremium, fiveGrid } = data
      const totalSymbol = fiveGrid.總格.symbol
      verdictEl.className = symbolClass(totalSymbol)
      verdictEl.innerHTML = [
        `<div class="level">${score.level}</div>`,
        `<div>加權分：${score.weighted} / 100</div>`,
        isPremium ? '<div class="premium">★ 雙吉格</div>' : '',
      ].join('')
    }

    function renderFiveGrid(fiveGrid) {
      fiveGridBody.replaceChildren()
      for (const key of FIVE_GRID_KEYS) {
        const grid = fiveGrid[key]
        const tr = document.createElement('tr')
        tr.className = symbolClass(grid.symbol)
        const relation = key === '總格' ? '—（本體）' : (grid.relation ?? '—')
        tr.innerHTML = [
          `<td>${key}</td>`,
          `<td>${grid.value}</td>`,
          `<td>${grid.digit}</td>`,
          `<td>${grid.wuxing}</td>`,
          `<td>${grid.symbol} ${grid.luck}</td>`,
          `<td>${grid.weight}</td>`,
          `<td>${relation}</td>`,
        ].join('')
        fiveGridBody.appendChild(tr)
      }
    }

    function renderExtended(extended) {
      extendedBody.replaceChildren()
      for (const key of EXTENDED_KEYS) {
        const grid = extended[key]
        const tr = document.createElement('tr')
        tr.innerHTML = [
          `<td>${key}</td>`,
          `<td>${grid.value}</td>`,
          `<td>${grid.digit}</td>`,
          `<td>${grid.wuxing}</td>`,
          `<td>${grid.relation ?? '—'}</td>`,
        ].join('')
        extendedBody.appendChild(tr)
      }
    }

    function renderAiComment(aiComment) {
      if (aiComment) {
        aiCommentSection.style.display = ''
        aiCommentText.textContent = aiComment
      } else {
        aiCommentSection.style.display = 'none'
        aiCommentText.textContent = ''
      }
    }

    function renderResult(data) {
      hideError()
      resultEl.hidden = false
      renderVerdict(data)
      renderFiveGrid(data.fiveGrid)
      renderExtended(data.extended)
      renderAiComment(data.aiComment)
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault()

      const phone = phoneInput.value.trim()
      const groups = groupsInput.value
        .split('-')
        .map((part) => Number(part.trim()))
      const wantAiComment = aiCommentToggle.checked

      if (wantAiComment) {
        aiCommentSection.style.display = ''
        aiCommentText.textContent = 'AI 解讀生成中…'
      } else {
        renderAiComment(null)
      }

      try {
        const response = await fetch('/api/analyze' + (wantAiComment ? '?aiComment=true' : ''), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, groups }),
        })

        const data = await response.json()

        if (!response.ok) {
          showError(data.error || '分析失敗，請稍後再試')
          return
        }

        renderResult(data)
      } catch {
        showError('無法連線至伺服器，請確認服務是否已啟動')
      }
    })

    // 支援從 rank.html 點擊號碼跳轉後自動分析
    const _urlParams = new URLSearchParams(window.location.search)
    const _prePhone = _urlParams.get('phone')
    if (_prePhone) {
      phoneInput.value = _prePhone
      form.requestSubmit()
    }
  </script>
</body>
</html>
