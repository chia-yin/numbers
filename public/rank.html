<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公號數字學 — 批次選號・好號碼篩選</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .source-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .source-card h2 { font-size: 1.25rem; font-weight: 600; color: var(--primary-dark); margin: 0 0 0.75rem; }
    #manualInput { width: 100%; font-family: monospace; font-size: 0.9rem; resize: vertical; padding: 0.6rem 0.7rem; border: 1px solid var(--border); border-radius: 8px; }
    select, #minGood { padding: 0.55rem 0.7rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; }
    .gridcells { display: inline-flex; gap: 4px; }
    .gridcells span {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
    }
    .good-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-weight: 700; color: var(--primary-dark);
    }
    .good-badge .n { font-size: 1.2rem; }
    #rankTable a { color: var(--primary-dark); text-decoration: none; font-weight: 600; }
    #rankTable a:hover { text-decoration: underline; }
    #stats { margin: 1rem 0 0.5rem; color: var(--muted); font-size: 0.92rem; }
    .legend { font-size: 0.82rem; color: var(--muted); margin-top: 0.4rem; }
  </style>
</head>
<body>
  <h1>公號數字學 — 批次選號</h1>
  <nav class="topnav">
    <a href="index.html">單號分析</a>
    <a href="rank.html" class="active">批次選號・好號碼篩選</a>
  </nav>

  <div class="source-card">
    <h2>① 號碼來源</h2>
    <label>
      選擇來源
      <select id="sourceSelect" style="width:100%;margin-top:0.3rem"><option value="">載入中…</option></select>
    </label>
    <label id="manualLabel" style="display:block;margin-top:0.75rem">
      貼入號碼（一行一個）
      <textarea id="manualInput" rows="7" placeholder="0912345678&#10;0987654321&#10;0936102682" style="margin-top:0.3rem"></textarea>
    </label>
    <div id="crawlControls" hidden style="margin-top:0.75rem">
      <button type="button" id="crawlBtn" class="btn">重新抓取</button>
      <button type="button" id="loadCacheBtn" class="btn" hidden style="background:#fff;color:var(--primary-dark);border:1px solid var(--primary-dark)">載入上次紀錄</button>
      <button type="button" id="dlRawBtn" class="btn" hidden>下載抓取號碼</button>
      <div id="cacheInfo" class="hint" style="margin-top:0.5rem"></div>
      <div id="crawlPreview" class="hint" style="margin-top:0.5rem"></div>
    </div>
  </div>

  <div class="source-card">
    <h2>② 篩選設定</h2>
    <label>
      只看「至少幾個吉（○）」的號碼
      <select id="minGood" style="margin-top:0.3rem">
        <option value="0">全部列出</option>
        <option value="1">≥ 1 個吉</option>
        <option value="2">≥ 2 個吉</option>
        <option value="3">≥ 3 個吉</option>
        <option value="4">≥ 4 個吉</option>
        <option value="5">5 個全吉</option>
      </select>
    </label>
    <details class="advanced" style="margin-top:0.6rem">
      <summary>進階：自訂分組規則</summary>
      <label>分組規則（留空＝自動）
        <input id="groups" type="text" placeholder="自動" pattern="^(\d+(-\d+)+)?$" style="margin-top:0.3rem">
      </label>
    </details>
    <p class="hint">留空即可：10 碼會自動去掉開頭 0，依老師算法切成 3-3-3。</p>
    <button type="button" id="rankBtn" class="btn" style="margin-top:0.5rem">分析並排名</button>
  </div>

  <div id="progress" hidden class="hint"></div>
  <div id="error" hidden></div>
  <div id="stats" hidden></div>
  <button type="button" id="csvBtn" class="btn" hidden style="margin-bottom:0.75rem">匯出 CSV</button>

  <table id="rankTable" hidden>
    <thead>
      <tr>
        <th>#</th>
        <th>號碼</th>
        <th>總格</th><th>天格</th><th>人格</th><th>地格</th><th>外格</th>
        <th>吉（○）</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <p id="legend" class="legend" hidden>○ 吉　▲ 半吉　X 凶　·　點號碼可看完整五格與斷語</p>

  <script>
    const SYMBOL_CLASS = { '○': 'symbol-good', '▲': 'symbol-mid', 'X': 'symbol-bad' }
    const GRID_ORDER = ['總格', '天格', '人格', '地格', '外格']
    const $ = (id) => document.getElementById(id)
    const sourceSelect = $('sourceSelect')
    const manualLabel = $('manualLabel')
    const manualInput = $('manualInput')
    const crawlControls = $('crawlControls')
    const crawlBtn = $('crawlBtn')
    const loadCacheBtn = $('loadCacheBtn')
    const dlRawBtn = $('dlRawBtn')
    const cacheInfo = $('cacheInfo')
    const crawlPreview = $('crawlPreview')
    const minGoodInput = $('minGood')
    const groupsInput = $('groups')
    const rankBtn = $('rankBtn')
    const progressEl = $('progress')
    const statsEl = $('stats')
    const rankTable = $('rankTable')
    const rankTableBody = rankTable.querySelector('tbody')
    const legendEl = $('legend')
    const csvBtn = $('csvBtn')
    const errorEl = $('error')

    let sources = []
    let crawledCandidates = []
    let lastRanked = []
    let cacheList = []

    const fmtTime = (iso) => { try { return new Date(iso).toLocaleString('zh-TW', { hour12: false }) } catch { return iso } }

    const symbolClass = (s) => SYMBOL_CLASS[s] || ''
    const showError = (m) => { errorEl.hidden = false; errorEl.textContent = m }
    const hideError = () => { errorEl.hidden = true; errorEl.textContent = '' }
    const getSelectedSource = () => sources.find((s) => s.id === sourceSelect.value)

    function updateSourceMode() {
      const source = getSelectedSource()
      const isText = !source || source.type === 'text'
      manualLabel.hidden = !isText
      crawlControls.hidden = isText
      if (!isText) { crawledCandidates = []; crawlPreview.textContent = ''; showCacheInfo() }
    }

    // 顯示此來源的上次抓取紀錄,有則開放「載入上次紀錄」
    function showCacheInfo() {
      const source = getSelectedSource()
      const snap = cacheList.find((s) => s.sourceId === source?.id)
      if (snap) {
        cacheInfo.textContent = `上次抓取：${fmtTime(snap.savedAt)}　共 ${snap.count} 筆`
        loadCacheBtn.hidden = false
      } else {
        cacheInfo.textContent = '尚無紀錄，請按「重新抓取」'
        loadCacheBtn.hidden = true
      }
    }

    async function loadCacheList() {
      try {
        const r = await fetch('/api/crawl/cache')
        cacheList = (await r.json()).snapshots || []
      } catch { cacheList = [] }
    }

    function populateSourceSelect(data) {
      sources = data.sources || []
      sourceSelect.replaceChildren()
      for (const source of sources) {
        const option = document.createElement('option')
        option.value = source.id
        option.textContent = source.name
        sourceSelect.appendChild(option)
      }
      const manualIndex = sources.findIndex((s) => s.id === 'manual')
      if (manualIndex >= 0) sourceSelect.selectedIndex = manualIndex
      updateSourceMode()
    }

    async function loadSources() {
      try {
        const response = await fetch('/api/sources')
        const data = await response.json()
        if (!response.ok) { showError(data.error || '無法載入來源清單'); return }
        populateSourceSelect(data)
      } catch {
        showError('無法連線至伺服器，請確認服務是否已啟動')
      }
    }

    function getCandidatesForRank() {
      const source = getSelectedSource()
      if (source && (source.type === 'url' || source.type === 'browser')) return crawledCandidates
      return manualInput.value.split('\n').map((l) => l.trim()).filter((l) => l.length > 0)
    }

    function gridCellsHtml(fiveGrid) {
      return '<div class="gridcells">' + GRID_ORDER.map((k) => {
        const s = fiveGrid[k].symbol
        return `<span class="${symbolClass(s)}" title="${k} ${fiveGrid[k].value}">${s}</span>`
      }).join('') + '</div>'
    }

    function renderRankTable(data, analyzedCount) {
      rankTableBody.replaceChildren()
      for (const item of data.ranked) {
        const phone = item.phone ?? item.input
        const tr = document.createElement('tr')
        tr.innerHTML = [
          `<td>${item.rank}</td>`,
          `<td><a href="index.html?phone=${encodeURIComponent(phone)}">${phone}</a></td>`,
          ...GRID_ORDER.map((k) => {
            const g = item.fiveGrid[k]
            return `<td class="${symbolClass(g.symbol)}">${g.symbol}</td>`
          }),
          `<td><span class="good-badge"><span class="n">${item.goodCount}</span>/5</span></td>`,
        ].join('')
        rankTableBody.appendChild(tr)
      }
      const empty = data.ranked.length === 0
      statsEl.textContent = `共分析 ${analyzedCount} 筆　·　符合條件 ${data.total} 筆　·　未列出 ${data.filtered} 筆`
      statsEl.hidden = false
      rankTable.hidden = empty
      legendEl.hidden = empty
      lastRanked = data.ranked
      csvBtn.hidden = empty
    }

    function downloadCsv() {
      if (!lastRanked.length) return
      const header = ['排名', '號碼', ...GRID_ORDER, '吉數']
      const rows = lastRanked.map((item) => {
        const phone = item.phone ?? item.input
        const syms = GRID_ORDER.map((k) => `${item.fiveGrid[k].symbol}${item.fiveGrid[k].value}`)
        return [item.rank, `="${phone}"`, ...syms, `${item.goodCount}/5`]
      })
      const csv = [header, ...rows].map((r) => r.join(',')).join('\r\n')
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' })
      const a = document.createElement('a')
      a.href = URL.createObjectURL(blob)
      a.download = `好號碼分析_${new Date().toISOString().slice(0, 10)}.csv`
      a.click()
      URL.revokeObjectURL(a.href)
    }
    csvBtn.addEventListener('click', downloadCsv)

    dlRawBtn.addEventListener('click', () => {
      if (!crawledCandidates.length) return
      const blob = new Blob([crawledCandidates.join('\n')], { type: 'text/plain;charset=utf-8' })
      const a = document.createElement('a')
      a.href = URL.createObjectURL(blob)
      a.download = `抓取號碼_${new Date().toISOString().slice(0, 10)}.txt`
      a.click()
      URL.revokeObjectURL(a.href)
    })

    sourceSelect.addEventListener('change', updateSourceMode)

    crawlBtn.addEventListener('click', async () => {
      hideError()
      const source = getSelectedSource()
      if (!source || (source.type !== 'url' && source.type !== 'browser')) { showError('此來源不支援自動抓取'); return }
      if (!source.url) { showError('此來源缺少 URL 設定'); return }
      const payload = source.type === 'browser'
        ? { id: source.id, type: 'browser', url: source.url, steps: source.steps, selector: source.selector, delayMs: source.delayMs, iterateSelect: source.iterateSelect, cht: source.cht, fet: source.fet }
        : { id: source.id, type: 'url', url: source.url, selector: source.selector }
      crawlBtn.disabled = true
      crawlPreview.textContent = source.type === 'browser' ? '開啟瀏覽器抓取中…（遠傳需逐前綴抓，約十餘分鐘，請稍候）' : '抓取中…'
      try {
        const response = await fetch('/api/crawl', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source: payload }),
        })
        const data = await response.json()
        if (!response.ok) { showError(data.error || '抓取失敗，請稍後再試'); crawlPreview.textContent = ''; return }
        crawledCandidates = data.candidates || []
        const preview = crawledCandidates.slice(0, 5).join('、')
        crawlPreview.textContent = `已抓取 ${crawledCandidates.length} 筆，前 5 筆：${preview || '（無）'}`
        dlRawBtn.hidden = crawledCandidates.length === 0
        await loadCacheList(); showCacheInfo() // 更新「上次抓取」顯示
      } catch {
        showError('無法連線至伺服器，請確認服務是否已啟動'); crawlPreview.textContent = ''
      } finally { crawlBtn.disabled = false }
    })

    // 載入上次抓取紀錄(免重抓)
    loadCacheBtn.addEventListener('click', async () => {
      hideError()
      const source = getSelectedSource()
      if (!source?.id) return
      loadCacheBtn.disabled = true
      try {
        const r = await fetch(`/api/crawl/cache/${encodeURIComponent(source.id)}`)
        const data = await r.json()
        if (!r.ok) { showError(data.error || '載入紀錄失敗'); return }
        crawledCandidates = data.candidates || []
        const preview = crawledCandidates.slice(0, 5).join('、')
        crawlPreview.textContent = `已載入上次紀錄 ${crawledCandidates.length} 筆，前 5 筆：${preview || '（無）'}`
        dlRawBtn.hidden = crawledCandidates.length === 0
      } catch {
        showError('無法連線至伺服器')
      } finally { loadCacheBtn.disabled = false }
    })

    rankBtn.addEventListener('click', async () => {
      hideError()
      const candidates = getCandidatesForRank()
      if (candidates.length === 0) { showError('請先輸入或抓取至少一筆號碼'); return }
      const groupsRaw = groupsInput.value.trim()
      const groups = groupsRaw ? groupsRaw.split('-').map((p) => Number(p.trim())) : undefined
      const minGood = Number(minGoodInput.value)
      progressEl.textContent = `分析中…（共 ${candidates.length} 筆）`
      progressEl.hidden = false
      rankBtn.disabled = true; statsEl.hidden = true; rankTable.hidden = true; legendEl.hidden = true
      try {
        const response = await fetch('/api/rank', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ candidates, groups, minGood }),
        })
        const data = await response.json()
        if (!response.ok) { showError(data.error || '排名失敗，請稍後再試'); return }
        renderRankTable(data, candidates.length)
      } catch {
        showError('無法連線至伺服器，請確認服務是否已啟動')
      } finally { progressEl.hidden = true; rankBtn.disabled = false }
    })

    document.addEventListener('DOMContentLoaded', async () => { await loadCacheList(); await loadSources() })
  </script>
</body>
</html>
