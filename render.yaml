services:
  - type: web
    name: jiesheng-numbers
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # 主機沒有 claude CLI,關掉 AI 解析(五格/斷語/爬蟲不受影響)
      - key: LLM_PROVIDER
        value: none
      # 不下載 Playwright 瀏覽器(CHT 爬蟲走純 fetch 不需要;FET 在免費主機不支援)
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: '1'
      # 無瀏覽器主機:隱藏 FET(需 Playwright);只留 CHT(純 fetch)
      - key: NO_PLAYWRIGHT
        value: '1'
